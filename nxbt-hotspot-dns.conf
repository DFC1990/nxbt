# NXBT Hotspot DNS Configuration
# Leitet ALLE DNS-Anfragen auf 192.168.4.1 um (Captive Portal)
#
# Installation:
#   sudo cp nxbt-hotspot-dns.conf /etc/dnsmasq.d/nxbt-hotspot.conf
#   sudo systemctl restart dnsmasq
#
# Nach Update (update.sh) ausführen:
#   sudo bash setup-captive-portal.sh

# Alle unbekannten Domains auf die lokale IP leiten
# Damit landen z.B. google.com, facebook.com etc. auf 192.168.4.1
address=/#/192.168.4.1

# DHCP-Server für den AP
dhcp-range=192.168.4.2,192.168.4.254,255.255.255.0,12h

# DNS
dhcp-option=option:dns-server,192.168.4.1

# Domänen lokal auflösen
local=/local/192.168.4.1
